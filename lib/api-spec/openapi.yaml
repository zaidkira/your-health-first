openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: My Health First API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: dashboard
    description: Dashboard summary
  - name: medications
    description: Medication tracking
  - name: records
    description: Medical records
  - name: doctors
    description: Doctor listings
  - name: appointments
    description: Appointment booking
  - name: pharmacies
    description: Pharmacy and medicine search
  - name: family
    description: Family member management
  - name: conditions
    description: Chronic conditions tracking
  - name: admin
    description: Admin user management
  - name: groups
    description: Patient community groups
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get current user full profile (includes doctor/pharmacy data)
      responses:
        "200":
          description: Full profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Unauthorized
    put:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List all medications for current user
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: createMedication
      tags: [medications]
      summary: Add a new medication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationBody"
      responses:
        "201":
          description: Medication created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  /medications/today:
    get:
      operationId: getTodaysMedications
      tags: [medications]
      summary: Get today's medication schedule
      responses:
        "200":
          description: Today's medications with taken status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationReminder"

  /medications/{id}:
    get:
      operationId: getMedication
      tags: [medications]
      summary: Get a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Not found
    patch:
      operationId: updateMedication
      tags: [medications]
      summary: Update a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicationBody"
      responses:
        "200":
          description: Updated medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Not found
    delete:
      operationId: deleteMedication
      tags: [medications]
      summary: Delete a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /medications/{id}/taken:
    post:
      operationId: markMedicationTaken
      tags: [medications]
      summary: Mark a medication as taken for today
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationReminder"

  /records:
    get:
      operationId: listRecords
      tags: [records]
      summary: List medical records
      responses:
        "200":
          description: List of medical records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicalRecord"
    post:
      operationId: createRecord
      tags: [records]
      summary: Create a medical record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordBody"
      responses:
        "201":
          description: Record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"

  /records/{id}:
    get:
      operationId: getRecord
      tags: [records]
      summary: Get a medical record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medical record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"
        "404":
          description: Not found
    delete:
      operationId: deleteRecord
      tags: [records]
      summary: Delete a medical record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List all doctors
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: wilaya
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          description: Not found

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for current user
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/upcoming:
    get:
      operationId: getUpcomingAppointments
      tags: [appointments]
      summary: Get next 3 upcoming appointments
      responses:
        "200":
          description: Upcoming appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /pharmacies:
    get:
      operationId: listPharmacies
      tags: [pharmacies]
      summary: Search pharmacies and medicines
      parameters:
        - name: medicine
          in: query
          schema:
            type: string
        - name: wilaya
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of pharmacies with medicine availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pharmacy"

  /family:
    get:
      operationId: listFamilyMembers
      tags: [family]
      summary: List family members
      responses:
        "200":
          description: List of family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
    post:
      operationId: createFamilyMember
      tags: [family]
      summary: Add a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyMemberBody"
      responses:
        "201":
          description: Family member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"

  /family/{id}:
    patch:
      operationId: updateFamilyMember
      tags: [family]
      summary: Update a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFamilyMemberBody"
      responses:
        "200":
          description: Updated family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Not found
    delete:
      operationId: deleteFamilyMember
      tags: [family]
      summary: Remove a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /family/{memberId}/emergency-contacts:
    get:
      operationId: listEmergencyContacts
      tags: [family]
      summary: List emergency contacts for a family member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of emergency contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyContact"
    post:
      operationId: createEmergencyContact
      tags: [family]
      summary: Add an emergency contact for a family member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmergencyContactBody"
      responses:
        "201":
          description: Emergency contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyContact"

  /family/{memberId}/emergency-contacts/{id}:
    patch:
      operationId: updateEmergencyContact
      tags: [family]
      summary: Update an emergency contact
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmergencyContactBody"
      responses:
        "200":
          description: Updated emergency contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyContact"
        "404":
          description: Not found
    delete:
      operationId: deleteEmergencyContact
      tags: [family]
      summary: Delete an emergency contact
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /records/{id}/share:
    post:
      operationId: shareRecord
      tags: [records]
      summary: Share a medical record with a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareRecordBody"
      responses:
        "201":
          description: Record shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedRecord"
        "404":
          description: Record not found

  /records/sent:
    get:
      operationId: listSentRecords
      tags: [records]
      summary: List records I have shared with doctors
      responses:
        "200":
          description: List of shared records with record and doctor info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedRecord"

  /records/received:
    get:
      operationId: listReceivedRecords
      tags: [records]
      summary: List records shared with me (doctor view)
      responses:
        "200":
          description: List of records received
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedRecord"

  /records/shared/{id}/reply:
    post:
      operationId: replyToSharedRecord
      tags: [records]
      summary: Doctor reply to a shared record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reply:
                  type: string
              required: [reply]
      responses:
        "200":
          description: Reply saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedRecord"

  /connections:
    get:
      summary: List connection requests
      tags: [Connections]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connection'
    post:
      summary: Send connection request
      tags: [Connections]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required: [email]
      responses:
        201:
          description: Request sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
  /connections/{id}:
    patch:
      summary: Respond to connection request
      tags: [Connections]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [accepted, rejected]
              required: [status]
      responses:
        200:
          description: Request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
    delete:
      summary: Remove connection
      tags: [Connections]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Connection removed

  /conditions:
    get:
      operationId: listConditions
      tags: [conditions]
      summary: List chronic conditions
      responses:
        "200":
          description: List of conditions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChronicCondition"
    post:
      operationId: createCondition
      tags: [conditions]
      summary: Add a chronic condition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConditionBody"
      responses:
        "201":
          description: Condition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChronicCondition"

  /conditions/{id}:
    patch:
      operationId: updateCondition
      tags: [conditions]
      summary: Update a chronic condition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConditionBody"
      responses:
        "200":
          description: Updated condition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChronicCondition"
        "404":
          description: Not found
    delete:
      operationId: deleteCondition
      tags: [conditions]
      summary: Delete a chronic condition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of all users with profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{id}:
    put:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update any user's profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DoctorProfile:
      type: object
      properties:
        specialty:
          type: string
        address:
          type: string
        availableDays:
          type: string
        availableHours:
          type: string
        consultationFee:
          type: number
        isOnlineConsultation:
          type: boolean
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
      required:
        - specialty
        - address
        - availableDays
        - availableHours
        - consultationFee

    PharmacyProfile:
      type: object
      properties:
        address:
          type: string
        is24h:
          type: boolean
        openTime:
          type: string
        closeTime:
          type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
      required:
        - address

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: ["string", "null"]
        wilaya:
          type: ["string", "null"]
        role:
          type: string
          enum: [patient, doctor, pharmacy]
          default: patient
        doctorProfile:
          $ref: "#/components/schemas/DoctorProfile"
        pharmacyProfile:
          $ref: "#/components/schemas/PharmacyProfile"
      required:
        - name
        - email
        - password

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        wilaya:
          type: ["string", "null"]
        bloodType:
          type: ["string", "null"]
        doctorProfile:
          $ref: "#/components/schemas/DoctorProfile"
        pharmacyProfile:
          $ref: "#/components/schemas/PharmacyProfile"

    ProfileResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        wilaya:
          type: ["string", "null"]
        bloodType:
          type: ["string", "null"]
        role:
          type: string
          enum: [patient, doctor, pharmacy, admin]
        createdAt:
          type: string
        doctorProfile:
          $ref: "#/components/schemas/DoctorProfile"
        pharmacyProfile:
          $ref: "#/components/schemas/PharmacyProfile"
      required:
        - id
        - name
        - email
        - role
        - createdAt

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        wilaya:
          type: ["string", "null"]
        bloodType:
          type: ["string", "null"]
        role:
          type: string
          enum: [patient, doctor, pharmacy, admin]
        createdAt:
          type: string
        doctorProfile:
          $ref: "#/components/schemas/DoctorProfile"
        pharmacyProfile:
          $ref: "#/components/schemas/PharmacyProfile"
      required:
        - id
        - name
        - email
        - role
        - createdAt

    DashboardSummary:
      type: object
      properties:
        medicationsToday:
          type: integer
        medicationsTakenToday:
          type: integer
        upcomingAppointments:
          type: integer
        totalRecords:
          type: integer
        familyMembers:
          type: integer
        activeMedications:
          type: integer
      required:
        - medicationsToday
        - medicationsTakenToday
        - upcomingAppointments
        - totalRecords
        - familyMembers
        - activeMedications

    Medication:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        familyMemberId:
          type: ["integer", "null"]
        name:
          type: string
        dosage:
          type: string
        frequency:
          type: string
        times:
          type: string
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - dosage
